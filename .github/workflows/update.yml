name: Update Deco Data

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Install dependencies
        run: pip install requests
          
      - name: Run update script
        run: python update_deco.py
        
      - name: Commit and push
        run: |
          git config --global user.name 'DecoBot'
          git config --global user.email 'bot@github.com'
          git add deco.json deco_b58.txt
          if git diff --quiet && git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Refresh 50 sites"
            git push
          fi
